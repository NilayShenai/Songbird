    <style>
      /* ================================================================
         CSS CUSTOM PROPERTIES (Design Tokens)
         ================================================================ */
      :root {
        /* Colors - Background */
        --color-bg: #000000;
        --color-panel: #000000;
        --color-panel-bg: #070709;
        
        /* Colors - Borders */
        --color-border: #1a1a1e;
        --color-border-dim: #121214;
        --color-border-panel: #1a1a1e;
        
        /* Pastel Palette colors */
        --pastel-lavender: #d8b4fe;
        --pastel-mint: #a7f3d0;
        --pastel-peach: #ffe3d1;
        --pastel-pink: #fbcfe8;
        --pastel-blue: #bae6fd;
        --pastel-yellow: #fef08a;

        /* Colors - Text */
        --color-text-title: var(--pastel-blue);
        --color-text-subtitle: #8b8b93;
        --color-text-label: #a1a1aa;
        --color-text-value: var(--pastel-lavender);
        --color-text-muted: #52525b;
        
        /* Colors - Interactive */
        --color-button-text: #8b8b93;
        --color-button-active-text: #000000;
        --color-button-active-bg: var(--pastel-blue);
        --color-button-hover-bg: #18181b;
        --color-button-hover-text: #ffffff;
        --color-input-text: var(--pastel-lavender);
        --color-fader-thumb: var(--pastel-pink);
        --color-fader-track: #09090b;
        
        /* Borders */
        --border-width-panel: 1px;
        --border-width-widget: 1px;
        
        /* Typography - Vertical Rhythm Adjustments */
        --text-offset-large: 0px;
        --text-offset-medium: 0px;
        --text-offset-small: 0px;
        
        /* Font */
        --font-family: "IBM Plex Mono", monospace;
      }

      /* ================================================================
         BASE STYLES
         ================================================================ */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      body {
        background-color: var(--color-bg);
        color: var(--color-text-value);
        font-family: var(--font-family);
        margin: 0;
        overflow-x: hidden;
        touch-action: manipulation;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      html,
      body,
      #root,
      #root * {
        -webkit-user-select: none;
        user-select: none;
      }

      ::selection {
        background: var(--color-button-text);
        color: var(--color-bg);
      }

      /* ================================================================
         SCROLLBARS
         ================================================================ */
      ::-webkit-scrollbar,
      *::-webkit-scrollbar {
        width: 4px;
        height: 4px;
      }

      ::-webkit-scrollbar-track,
      *::-webkit-scrollbar-track {
        background: var(--color-panel);
        border-left: 1px solid var(--color-border-dim);
      }

      ::-webkit-scrollbar-thumb,
      *::-webkit-scrollbar-thumb {
        background: var(--color-border-dim);
        border-radius: 0px;
      }

      ::-webkit-scrollbar-thumb:hover,
      *::-webkit-scrollbar-thumb:hover {
        background: var(--color-text-subtitle);
      }

      html {
        scrollbar-width: thin;
        scrollbar-color: var(--color-border-dim) var(--color-panel);
      }

      ._scroll-thin {
        scrollbar-width: thin;
        scrollbar-color: var(--color-border-dim) var(--color-panel);
      }

      ._scroll-thin::-webkit-scrollbar {
        width: 4px !important;
        height: 4px !important;
      }

      /* ================================================================
         TAILWIND OVERRIDES
         ================================================================ */
      .bg-zinc-950 { background-color: var(--color-bg) !important; }
      .bg-black { background-color: var(--color-panel) !important; }
      .bg-zinc-900 { background-color: var(--color-border-dim) !important; }
      .bg-zinc-900\/20 { background-color: rgba(22, 22, 25, 0.2) !important; }
      .border-zinc-400 { border-color: var(--color-border-panel) !important; }
      .border-zinc-700 { border-color: var(--color-border-dim) !important; }
      .border-zinc-800 { border-color: var(--color-border-dim) !important; }
      .text-zinc-300 { color: var(--color-text-value) !important; }
      .text-zinc-400 { color: var(--color-text-subtitle) !important; }
      .text-zinc-500 { color: var(--color-text-muted) !important; }
      .text-zinc-600 { color: var(--color-text-muted) !important; }

      /* ================================================================
         DESKTOP MODULAR CARD LAYOUTS (CLEANED)
         ================================================================ */
      @media (min-width: 1025px) {
        /* Ensure true black background for workspace gutters */
        .flex-1.flex.overflow-hidden {
          background-color: #000000 !important;
        }
      }

      /* ================================================================
         TYPOGRAPHY (_t-*)
         ================================================================ */
      
      ._t-app-title {
        font-family: var(--font-family);
        font-weight: 700;
        font-size: 28px;
        color: var(--color-text-title);
        letter-spacing: 0.1em;
        text-transform: uppercase;
        line-height: 1;
        transform: translateY(var(--text-offset-large));
      }

      ._t-app-subtitle {
        font-family: var(--font-family);
        font-weight: 700;
        font-size: 11px;
        color: var(--color-text-subtitle);
        letter-spacing: 0.3em;
        text-transform: uppercase;
        line-height: 1;
      }

      ._t-panel-title {
        font-family: var(--font-family);
        font-weight: 700;
        font-size: 18px;
        color: var(--color-text-title);
        letter-spacing: 0.1em;
        text-transform: uppercase;
        line-height: 1;
        transform: translateY(var(--text-offset-large));
      }

      ._t-panel-desc {
        font-family: var(--font-family);
        font-weight: 700;
        font-size: 10px;
        color: var(--color-text-subtitle);
        text-transform: uppercase;
        line-height: 1;
        transform: translateY(var(--text-offset-medium));
      }

      ._t-sub-sect {
        font-family: var(--font-family);
        font-weight: 400;
        font-size: 13px;
        color: var(--color-text-subtitle);
        text-transform: uppercase;
        line-height: 1;
        transform: translateY(var(--text-offset-large));
      }

      ._t-label,
      ._t-definition-term,
      ._t-modal-footnote-white {
        font-family: var(--font-family);
        font-weight: 400;
        font-size: 11px;
        color: var(--color-text-label);
        text-transform: uppercase;
        line-height: 1;
        transform: translateY(var(--text-offset-medium));
      }

      ._t-value {
        font-family: var(--font-family);
        font-weight: 400;
        font-size: 11px;
        color: var(--color-text-value);
        line-height: 1;
        transform: translateY(var(--text-offset-medium));
      }

      ._t-midi-value {
        font-family: var(--font-family);
        font-weight: 700;
        font-size: 9px;
        color: var(--color-text-value);
        line-height: 1;
        transform: translateY(var(--text-offset-medium));
      }

      ._t-btn {
        font-family: var(--font-family);
        font-weight: 700;
        font-size: 10px;
        text-transform: uppercase;
        line-height: 1;
      }

      ._t-input {
        font-family: var(--font-family);
        font-weight: 700;
        font-size: 10px;
        color: var(--color-input-text);
        text-transform: uppercase;
        line-height: 1;
      }

      ._t-body,
      ._t-foot-body,
      ._t-init-foot-body {
        font-family: var(--font-family);
        font-weight: 400;
        font-size: 11px;
        color: var(--color-text-muted);
      }

      ._t-meta,
      ._t-foot-meta,
      ._t-init-foot-meta {
        font-family: var(--font-family);
        font-weight: 700;
        font-size: 10px;
        color: var(--color-text-muted);
        line-height: 1;
      }

      ._t-footer-title {
        font-family: var(--font-family);
        font-weight: 700;
        font-size: 18px;
        color: var(--color-text-title);
        text-transform: uppercase;
        line-height: 1;
      }

      ._t-modal-title {
        font-family: var(--font-family);
        font-weight: 700;
        font-size: 16px;
        color: var(--color-text-title);
        letter-spacing: 0.1em;
        text-transform: uppercase;
        line-height: 1;
      }

      ._t-modal-sub-title {
        font-family: var(--font-family);
        font-weight: 400;
        font-size: 12px;
        color: var(--color-text-subtitle);
        text-transform: uppercase;
        line-height: 1;
        transform: translateY(var(--text-offset-large));
      }

      ._t-modal-body,
      ._t-modal-footnote {
        font-family: var(--font-family);
        font-weight: 400;
        font-size: 10px;
        color: var(--color-text-muted);
        line-height: 1.625;
      }

      ._t-link {
        font-family: var(--font-family);
        font-weight: 400;
        font-size: 10px;
        line-height: 1.625;
        color: var(--color-text-muted);
        text-decoration: none;
        border-bottom: 1px solid transparent;
        transition: color 0.1s ease, border-color 0.1s ease;
      }

      ._t-link:hover {
        color: white;
        border-bottom-color: var(--color-border);
      }

      ._t-init-title {
        font-family: var(--font-family);
        font-weight: 700;
        font-size: 46px;
        color: var(--color-text-title);
        letter-spacing: 0.1em;
        text-transform: uppercase;
        line-height: 1;
        transform: translateY(var(--text-offset-small));
      }

      ._t-init-subtitle {
        font-family: var(--font-family);
        font-weight: 700;
        font-size: 12px;
        color: var(--color-text-subtitle);
        letter-spacing: 0.3em;
        text-transform: uppercase;
        line-height: 1;
      }

      ._t-init-btn {
        font-family: var(--font-family);
        font-weight: 700;
        font-size: 10px;
        text-transform: uppercase;
        line-height: 1;
        transform: translateY(var(--text-offset-medium));
      }

      /* ================================================================
         BOX MODEL (_b-*)
         ================================================================ */
      ._b-panel {
        background-color: var(--color-panel-bg);
        border-color: var(--color-border-panel);
        border-radius: 0px;
      }

      ._b-panel.border {
        border-width: var(--border-width-panel);
        border-style: solid;
      }

      ._b-widget {
        border-color: var(--color-border-dim);
      }

      ._b-widget.border {
        border-width: var(--border-width-widget);
        border-style: solid;
      }

      ._b-widget.border-t {
        border-top-width: var(--border-width-widget);
        border-style: solid;
      }

      ._b-widget.border-b {
        border-bottom-width: var(--border-width-widget);
        border-style: solid;
      }
      
      ._b-eq-fader-zeroline {
        position: absolute;
        top: 50%;
        left: 0;
        right: 0;
        height: var(--border-width-widget);
        z-index: 0;
        opacity: 0.5;
        background-color: var(--color-border);
      }

      /* ================================================================
         CONTROLS (_c-*)
         ================================================================ */
      ._c-btn {
        height: 26px;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-style: solid;
        border-width: var(--border-width-widget);
        border-color: transparent;
        transition: all 0.1s ease;
        border-radius: 0px;
      }

      ._c-btn-init {
        height: 40px;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-style: solid;
        border-width: var(--border-width-widget);
        border-color: transparent;
        transition: all 0.1s ease;
        border-radius: 0px;
      }

      ._c-btn-close {
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 4px 0 4px 8px;
        border-width: 0;
        background-color: transparent;
        color: var(--color-text-value);
        font-family: var(--font-family);
        font-weight: 700;
        font-size: 10px;
        text-transform: uppercase;
        transition: all 0.1s ease;
      }

      ._c-btn-close:hover {
        color: var(--color-text-title);
      }

      ._c-input {
        display: block; /* Input is replaced element, flex is invalid */
        width: 100%;
        height: 26px;
        line-height: 24px; /* Center text vertically */
        padding: 0 4px;
        background-color: var(--color-panel-bg);
        border-style: solid;
        border-width: var(--border-width-widget);
        border-color: var(--color-border);
        transition: all 0.1s ease;
        border-radius: 0px;
      }

      ._c-overlay {
        position: fixed;
        inset: 0;
        z-index: 60;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: rgba(0, 0, 0, 0.9);
      }

      input[type="range"]._c-fader {
        -webkit-appearance: none;
        appearance: none;
        width: 100%;
        height: 22px;
        background: transparent;
        cursor: ew-resize;
        outline: none;
      }

      input[type="range"]._c-fader::-webkit-slider-runnable-track {
        width: 100%;
        height: 6px;
        background: var(--color-fader-track);
        border: var(--border-width-widget) solid var(--color-border);
        border-radius: 0px;
      }

      input[type="range"]._c-fader::-webkit-slider-thumb {
        -webkit-appearance: none;
        height: 16px;
        width: 16px;
        border-radius: 0px;
        background: var(--color-fader-thumb);
        cursor: ew-resize;
        margin-top: -6px; /* center thumb vertically */
        border: none;
      }

      input[type="range"]._c-fader::-moz-range-track {
        width: 100%;
        height: 6px;
        background: var(--color-fader-track);
        border: var(--border-width-widget) solid var(--color-border);
        border-radius: 0px;
      }

      input[type="range"]._c-fader::-moz-range-thumb {
        height: 16px;
        width: 16px;
        border-radius: 0px;
        background: var(--color-fader-thumb);
        cursor: ew-resize;
        border: none;
      }

      /* Vertical Fader Primitive */
      ._c-fader-vertical {
        width: 160px !important; /* Becomes visual height */
        height: 22px !important; /* Becomes visual width */
        transform: rotate(-90deg);
        transform-origin: center;
        margin: 0;
        cursor: ns-resize;
      }
      
      /* EQ Panel Primitives */
      ._c-eq-panel {
        display: flex;
        align-items: stretch;
        justify-content: space-between;
        height: 100%;
        min-height: 0;
        padding-left: 0.5rem;
        padding-right: 0.5rem;
      }
      
      ._c-eq-fader {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: space-between;
        height: 100%;
        width: 2rem; /* 32px */
      }
      
      ._c-eq-fader-label-container {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        height: 1rem; /* 16px */
      }
      
      ._c-eq-fader-track {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        min-height: 0;
        flex-grow: 1;
        container-type: size;
      }

      ._c-eq-fader-input {
        width: 160px !important; /* Fallback for browsers without cqh */
        width: min(160px, calc(100cqh - 2px)) !important;
      }

      .custom-select {
        -webkit-appearance: none;
        appearance: none;
        background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 24 24' stroke='%23d4d4d8' stroke-width='2'%3e%3cpath stroke-linecap='round' stroke-linejoin='round' d='M19 9l-7 7-7-7'/%3e%3c/svg%3e");
        background-repeat: no-repeat;
        background-position: right 0.5rem center;
        background-size: 1rem;
        padding-right: 2rem;
      }

      .custom-select:hover {
        background-color: var(--color-button-hover-bg);
        color: var(--color-button-hover-text);
        border-color: var(--color-button-hover-text);
      }

      @media (max-width: 1024px) {
        input[type="range"]._c-fader {
          height: 32px;
        }

        input[type="range"]._c-fader::-webkit-slider-thumb {
          width: 28px;
          height: 32px;
        }

        input[type="range"]._c-fader::-moz-range-thumb {
          width: 28px;
          height: 32px;
        }
        ._b-widget.border-b:has(._t-panel-title) {
          border-bottom-width: 0 !important;
          padding-bottom: 0 !important;
        }

        .flex.justify-between.items-end._b-widget:has(._t-panel-title) {
          align-items: center !important;
        }

      }

      /* ================================================================
         STATES (_s-*)
         ================================================================ */
      ._s-inactive {
        background-color: var(--color-panel);
        color: var(--color-button-text);
        border-color: var(--color-border-dim);
      }

      ._s-inactive:hover {
        background-color: var(--color-button-hover-bg);
        color: var(--color-button-hover-text);
        border-color: var(--color-button-hover-text);
      }

      ._s-active {
        background-color: var(--color-button-active-bg);
        color: var(--color-button-active-text);
        border-color: var(--color-button-active-bg);
      }

      ._s-header {
        background-color: transparent;
        color: var(--color-button-text);
        border-color: transparent;
      }

      ._s-header:hover {
        color: var(--color-button-text);
        border-color: var(--color-border-dim);
      }

      ._c-btn-init._s-inactive {
        color: var(--color-text-value);
      }

      /* Rack Tab States */
      ._rack-tab-active {
          background-color: var(--color-button-hover-bg);
          color: var(--color-button-hover-text);
      }

      ._rack-tab-inactive {
          background-color: var(--color-panel);
          color: var(--color-text-subtitle);
      }

      ._rack-tab-inactive:hover {
          background-color: var(--color-panel);
          color: var(--color-button-hover-text);
      }

      ._rack-tab-active ._t-panel-desc,
      ._rack-tab-inactive:hover ._t-panel-desc {
          color: var(--color-button-hover-text);
      }
    </style>

</head>
